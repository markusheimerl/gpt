# .github/workflows/pages.yml
#
# Builds and deploys a static GitHub Pages site that runs the INT8-quantized
# GPT model in the browser, in pure JavaScript.
#
# Everything the demo needs lives in this one folder:
#   .github/workflows/pages.yml      <- this file: inline HTML+JS + deploy logic
#   .github/workflows/model.bin.xz   <- xz-compressed INT8 weights (~32 MB)
#
# Nothing else (no HTML / JS / WASM) is committed to the repo. At deploy time
# the workflow writes _site/index.html from the inline heredoc below and
# decompresses _site/model.bin from model.bin.xz.
#
# Setup:
#   - Repo Settings -> Pages -> Build and deployment -> source: "GitHub Actions".
#   - Push to `main` (or use "Run workflow" in the Actions tab).

name: Deploy GPT Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - '.github/workflows/model.bin.xz'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for model.bin.xz)
        uses: actions/checkout@v4

      - name: Assemble static site
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p _site

          # ---- index.html (inline HTML + JS inference) --------------------
          cat > _site/index.html <<'HTML_EOF'
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>tiny-stories GPT - in your browser, from a single YAML</title>
          <style>
            :root { color-scheme: dark; }
            body {
              font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
              max-width: 820px;
              margin: 2rem auto;
              padding: 0 1rem 4rem;
              background: #0f1115;
              color: #d8dee9;
              line-height: 1.5;
            }
            h1 { color: #f0c674; font-size: 1.25rem; margin: 0 0 .25rem; }
            h1 a { color: inherit; }
            .sub { color: #888; font-size: .9rem; margin: 0 0 1.5rem; }
            textarea, input, button, select {
              font: inherit; color: inherit;
              background: #181b21; border: 1px solid #2c313a;
              padding: .45em .7em; border-radius: 6px;
            }
            textarea { width: 100%; box-sizing: border-box; resize: vertical; }
            button { cursor: pointer; }
            button:hover:not(:disabled) { border-color: #f0c674; }
            button:disabled { opacity: .5; cursor: not-allowed; }
            pre {
              white-space: pre-wrap; word-break: break-word;
              background: #07090d; border: 1px solid #232831;
              padding: 1rem; border-radius: 6px; min-height: 9rem;
              font-size: .95rem;
            }
            pre .gen { color: #b5bd68; }
            pre .cursor { color: #f0c674; animation: blink 1s steps(1) infinite; }
            @keyframes blink { 50% { opacity: 0; } }
            .row { display: flex; gap: .6rem; align-items: center; margin: .6rem 0; flex-wrap: wrap; }
            .row label { display: inline-flex; align-items: center; gap: .35rem; color: #aaa; font-size: .9rem; }
            .row input[type=number] { width: 5.5em; }
            .status { color: #888; font-size: .85rem; margin: .5rem 0; }
            .status .err { color: #cc6666; }
            .status .ok  { color: #b5bd68; }
            .bar { background: #181b21; border: 1px solid #2c313a; border-radius: 6px; overflow: hidden; height: 6px; margin: .35rem 0; }
            .bar > div { background: #f0c674; height: 100%; width: 0; transition: width .15s; }
            footer { color: #555; font-size: .8rem; margin-top: 2rem; }
            footer a { color: #888; }
          </style>
          </head>
          <body>
          
          <h1>tiny-stories GPT - running in your browser</h1>
          <p class="sub">
            Pure-C trained GPT, INT8 quantized, inference in vanilla JS.
            No bundler, no WASM, no committed HTML/JS - was served from a single workflow YAML.
          </p>
          
          <div class="status" id="status">initializing&hellip;</div>
          <div class="bar"><div id="bar"></div></div>
          
          <textarea id="prompt" rows="3">Once upon a time, there was a</textarea>
          
          <div class="row">
            <label>tokens <input id="ntok"  type="number" value="300" min="1"   max="1024" step="1"></label>
            <label>T      <input id="temp"  type="number" value="0.7" min="0.1" max="2"    step="0.1"></label>
            <label>seed   <input id="seed"  type="number" value="42"></label>
            <button id="go"   disabled>Generate</button>
            <button id="stop" disabled>Stop</button>
          </div>
          
          <pre id="out"><span class="cursor">_</span></pre>
          
          <footer>
            Trained on <a href="https://huggingface.co/datasets/roneneldan/TinyStories">TinyStories</a>
            &middot; source: <a href="https://github.com/markusheimerl/gpt">markusheimerl/gpt</a>
          </footer>
          
          <script>
          'use strict';
          
          const $ = id => document.getElementById(id);
          const elStatus = $('status'), elBar = $('bar'), elOut = $('out');
          const elGo = $('go'), elStop = $('stop');
          
          let MODEL = null, RUNNING = false, STOP = false;
          
          /* -------- xorshift RNG (seedable) -------- */
          function mkRng(seed) {
            let s = (seed | 0) || 1;
            return () => {
              s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
              return (s >>> 0) / 4294967296;
            };
          }
          
          /* -------- INT8 matvec: y[r] = scales[r] * sum_c q[r,c] * x[c] -------- */
          function qmatvec(Wq, Wsc, rows, cols, x, y) {
            for (let r = 0; r < rows; r++) {
              const base = r * cols;
              let a0 = 0, a1 = 0, a2 = 0, a3 = 0;
              let c = 0;
              for (; c + 4 <= cols; c += 4) {
                a0 += Wq[base + c    ] * x[c    ];
                a1 += Wq[base + c + 1] * x[c + 1];
                a2 += Wq[base + c + 2] * x[c + 2];
                a3 += Wq[base + c + 3] * x[c + 3];
              }
              let acc = a0 + a1 + a2 + a3;
              for (; c < cols; c++) acc += Wq[base + c] * x[c];
              y[r] = acc * Wsc[r];
            }
          }
          
          function rmsnorm(out, x, d) {
            let ss = 0;
            for (let i = 0; i < d; i++) ss += x[i] * x[i];
            const s = 1 / Math.sqrt(ss / d + 1e-6);
            for (let i = 0; i < d; i++) out[i] = x[i] * s;
          }
          
          function ropeApply(q, k, pos, d) {
            const half = d >> 1;
            for (let dp = 0; dp < half; dp++) {
              const di = dp * 2;
              const angle = pos * Math.pow(10000, -di / d);
              const ca = Math.cos(angle), sa = Math.sin(angle);
              const q0 = q[di], q1 = q[di + 1];
              q[di] = q0 * ca - q1 * sa; q[di + 1] = q0 * sa + q1 * ca;
              const k0 = k[di], k1 = k[di + 1];
              k[di] = k0 * ca - k1 * sa; k[di + 1] = k0 * sa + k1 * ca;
            }
          }
          
          /* -------- model loader (streams progress) -------- */
          async function loadModel(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('fetch model.bin: HTTP ' + resp.status);
            const total = +(resp.headers.get('content-length') || 0);
            const reader = resp.body.getReader();
            const chunks = []; let got = 0;
            for (;;) {
              const { value, done } = await reader.read();
              if (done) break;
              chunks.push(value); got += value.length;
              if (total) elBar.style.width = (100 * got / total).toFixed(1) + '%';
              elStatus.textContent = 'downloading model: ' + (got / 1048576).toFixed(1) + ' MB';
            }
            const buf = new ArrayBuffer(got);
            const u8 = new Uint8Array(buf);
            let off = 0;
            for (const c of chunks) { u8.set(c, off); off += c.length; }
            elBar.style.width = '100%';
          
            const dv = new DataView(buf);
            if (String.fromCharCode(u8[0], u8[1], u8[2], u8[3]) !== 'QGPT')
              throw new Error('bad magic: not a QGPT file');
            let p = 4;
            const d_model    = dv.getInt32(p, true); p += 4;
            const hidden_dim = dv.getInt32(p, true); p += 4;
            const num_layers = dv.getInt32(p, true); p += 4;
            const vocab_size = dv.getInt32(p, true); p += 4;
            const is_causal  = u8[p++] !== 0;
            const use_rope   = u8[p++] !== 0;
          
            function readQT() {
              const rows = dv.getInt32(p, true); p += 4;
              const cols = dv.getInt32(p, true); p += 4;
              const n = rows * cols;
              const q = new Int8Array(buf, p, n); p += n;
              /* Float32Array requires 4-byte alignment of the byte offset.
                 Copy via slice() to a fresh aligned buffer to be safe. */
              const sc = new Float32Array(buf.slice(p, p + rows * 4)); p += rows * 4;
              return { q, sc, rows, cols };
            }
          
            const tok_emb = readQT();
            const layers = [];
            for (let l = 0; l < num_layers; l++) {
              const Wq = readQT(), Wk = readQT(), Wv = readQT(), Wo = readQT();
              const W1 = readQT(), W2 = readQT();
              layers.push({ Wq, Wk, Wv, Wo, W1, W2 });
            }
            return { d_model, hidden_dim, num_layers, vocab_size, is_causal, use_rope, tok_emb, layers };
          }
          
          /* -------- forward-pass state -------- */
          function makeState(m, seq_len) {
            const d = m.d_model;
            const num_heads = 8;
            const head_dim = d / num_heads;
            const kv = m.layers.map(() => ({
              K: new Float32Array(seq_len * d),
              V: new Float32Array(seq_len * d),
            }));
            return {
              seq_len, num_heads, head_dim,
              x: new Float32Array(d),
              n1: new Float32Array(d), n2: new Float32Array(d),
              q: new Float32Array(d), k: new Float32Array(d), v: new Float32Array(d),
              z: new Float32Array(d),
              attn_out: new Float32Array(d),
              h: new Float32Array(m.hidden_dim),
              swish: new Float32Array(m.hidden_dim),
              mlp_out: new Float32Array(d),
              final_norm: new Float32Array(d),
              logits: new Float32Array(m.vocab_size),
              scores: new Float32Array(seq_len),
              kv,
            };
          }
          
          function embedLookup(emb, token, x, d) {
            const base = token * d;
            const s = emb.sc[token];
            for (let i = 0; i < d; i++) x[i] = emb.q[base + i] * s;
          }
          
          function attnForward(W, kv, S, m, pos) {
            const d = m.d_model, hd = S.head_dim, nh = S.num_heads;
            const scale = 1 / Math.sqrt(hd);
          
            qmatvec(W.Wq.q, W.Wq.sc, W.Wq.rows, W.Wq.cols, S.n1, S.q);
            qmatvec(W.Wk.q, W.Wk.sc, W.Wk.rows, W.Wk.cols, S.n1, S.k);
            qmatvec(W.Wv.q, W.Wv.sc, W.Wv.rows, W.Wv.cols, S.n1, S.v);
          
            if (m.use_rope) ropeApply(S.q, S.k, pos, d);
          
            const off = pos * d;
            kv.K.set(S.k, off);
            kv.V.set(S.v, off);
          
            S.z.fill(0);
            const sc = S.scores;
            for (let h = 0; h < nh; h++) {
              const qoff = h * hd;
              let maxs = -Infinity;
              for (let j = 0; j <= pos; j++) {
                const koff = j * d + qoff;
                let s = 0;
                for (let e = 0; e < hd; e++) s += S.q[qoff + e] * kv.K[koff + e];
                s *= scale;
                sc[j] = s;
                if (s > maxs) maxs = s;
              }
              let sum = 0;
              for (let j = 0; j <= pos; j++) { sc[j] = Math.exp(sc[j] - maxs); sum += sc[j]; }
              const inv = 1 / sum;
              for (let j = 0; j <= pos; j++) {
                const p = sc[j] * inv;
                const voff = j * d + qoff;
                for (let e = 0; e < hd; e++) S.z[qoff + e] += p * kv.V[voff + e];
              }
            }
            qmatvec(W.Wo.q, W.Wo.sc, W.Wo.rows, W.Wo.cols, S.z, S.attn_out);
          }
          
          function mlpForward(W, S, m) {
            qmatvec(W.W1.q, W.W1.sc, W.W1.rows, W.W1.cols, S.n2, S.h);
            for (let i = 0; i < m.hidden_dim; i++) {
              const h = S.h[i];
              S.swish[i] = h / (1 + Math.exp(-h));
            }
            qmatvec(W.W2.q, W.W2.sc, W.W2.rows, W.W2.cols, S.swish, S.mlp_out);
          }
          
          function gptForward(m, S, token, pos) {
            const d = m.d_model;
            embedLookup(m.tok_emb, token, S.x, d);
            for (let l = 0; l < m.num_layers; l++) {
              rmsnorm(S.n1, S.x, d);
              attnForward(m.layers[l], S.kv[l], S, m, pos);
              for (let i = 0; i < d; i++) S.x[i] += S.attn_out[i];
              rmsnorm(S.n2, S.x, d);
              mlpForward(m.layers[l], S, m);
              for (let i = 0; i < d; i++) S.x[i] += S.mlp_out[i];
            }
            rmsnorm(S.final_norm, S.x, d);
            qmatvec(m.tok_emb.q, m.tok_emb.sc, m.tok_emb.rows, m.tok_emb.cols, S.final_norm, S.logits);
          }
          
          function sampleToken(logits, V, T, rng) {
            let mx = -Infinity;
            for (let v = 0; v < V; v++) { logits[v] /= T; if (logits[v] > mx) mx = logits[v]; }
            let sum = 0;
            for (let v = 0; v < V; v++) { logits[v] = Math.exp(logits[v] - mx); sum += logits[v]; }
            let r = rng(), c = 0;
            for (let v = 0; v < V; v++) {
              c += logits[v] / sum;
              if (r <= c) return v;
            }
            return V - 1;
          }
          
          /* -------- generation driver -------- */
          function escapeChar(c) {
            if (c === '<') return '&lt;';
            if (c === '>') return '&gt;';
            if (c === '&') return '&amp;';
            return c;
          }
          
          async function generate() {
            const prompt = $('prompt').value;
            const Nt   = Math.max(1, Math.min(1024, +$('ntok').value || 1));
            const T    = Math.max(0.05, +$('temp').value || 0.7);
            const seed = +$('seed').value || 1;
          
            const seq_len = Math.min(1024, prompt.length + Nt + 4);
            if (prompt.length >= seq_len) { elStatus.innerHTML = '<span class="err">prompt too long</span>'; return; }
          
            const S = makeState(MODEL, seq_len);
            const rng = mkRng(seed);
            elOut.innerHTML = '';
          
            /* feed prompt */
            for (let pos = 0; pos < prompt.length; pos++) {
              if (STOP) break;
              const tok = prompt.charCodeAt(pos) & 0xff;
              gptForward(MODEL, S, tok, pos);
              elOut.innerHTML += escapeChar(prompt[pos]);
            }
            elOut.innerHTML += '<span class="gen">';
          
            /* sample */
            const t0 = performance.now();
            let nGen = 0;
            for (let pos = prompt.length; pos < prompt.length + Nt; pos++) {
              if (STOP) break;
              const next = sampleToken(S.logits, MODEL.vocab_size, T, rng);
              elOut.innerHTML += escapeChar(String.fromCharCode(next));
              gptForward(MODEL, S, next, pos);
              nGen++;
              if ((nGen & 3) === 0) {
                const tps = nGen / ((performance.now() - t0) / 1000);
                elStatus.innerHTML = '<span class="ok">generating</span> &middot; ' +
                  nGen + ' tokens &middot; ' + tps.toFixed(1) + ' tok/s';
                await new Promise(r => setTimeout(r, 0));
              }
            }
            elOut.innerHTML += '</span>';
            const dt = (performance.now() - t0) / 1000;
            elStatus.innerHTML = '<span class="ok">done</span> &middot; ' +
              nGen + ' tokens in ' + dt.toFixed(2) + 's (' + (nGen / dt).toFixed(1) + ' tok/s)';
          }
          
          /* -------- boot -------- */
          (async () => {
            try {
              elStatus.textContent = 'loading model (~33 MB)';
              MODEL = await loadModel('model.bin');
              elStatus.innerHTML = '<span class="ok">model ready</span> &middot; ' +
                'd_model=' + MODEL.d_model +
                ' &middot; layers=' + MODEL.num_layers +
                ' &middot; hidden=' + MODEL.hidden_dim +
                ' &middot; vocab=' + MODEL.vocab_size;
              elGo.disabled = false;
              elOut.innerHTML = '<span class="cursor">_</span>';
            } catch (e) {
              elStatus.innerHTML = '<span class="err">error: ' + e.message + '</span>';
            }
          })();
          
          elGo.onclick = async () => {
            if (RUNNING) return;
            RUNNING = true; STOP = false;
            elGo.disabled = true; elStop.disabled = false;
            try { await generate(); }
            catch (e) { elStatus.innerHTML = '<span class="err">error: ' + e.message + '</span>'; }
            RUNNING = false;
            elGo.disabled = false; elStop.disabled = true;
          };
          
          elStop.onclick = () => { STOP = true; };
          </script>
          </body>
          </html>
          HTML_EOF

          # Resolve {{REPO}} placeholder.
          sed -i "s|{{REPO}}|${REPO}|g" _site/index.html

          # ---- Decompress quantized weights from committed .xz ------------
          xz -dc .github/workflows/model.bin.xz > _site/model.bin

          # Sanity check: confirm QGPT magic header.
          MAGIC=$(head -c 4 _site/model.bin)
          if [ "${MAGIC}" != "QGPT" ]; then
            echo "ERROR: model.bin missing QGPT magic (got: ${MAGIC})"
            exit 1
          fi

          # Custom domain (must match Settings -> Pages -> Custom domain).
          echo 'gpt.markusheimerl.com' > _site/CNAME

          echo "Site assembled:"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
